name: Deploy to Lightsail

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /home/ubuntu/4.0MarketFinal

            echo "==> Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd --exclude=.env --exclude=uploads/

            echo "==> Installing backend dependencies..."
            npm install --omit=dev

            echo "==> Installing & building frontend..."
            cd app
            npm install
            chmod +x node_modules/.bin/vite
            npm run build
            cd ..

            echo "==> Restarting server..."
            pm2 delete Market 2>/dev/null || true
            pm2 restart 4market --update-env || pm2 start app.js --name 4market
            pm2 save

            echo "==> Waiting for app to stabilise..."
            sleep 5
            pm2 list
            echo "==> App logs:"
            pm2 logs 4market --lines 40 --nostream

            echo "==> Configuring Nginx..."
            sudo cp nginx/4market.conf /etc/nginx/sites-available/4market
            sudo ln -sf /etc/nginx/sites-available/4market /etc/nginx/sites-enabled/4market
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t
            sudo systemctl reload nginx

            echo "==> Deploy complete!"
